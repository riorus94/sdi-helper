name: Pose Training Every 20 Minutes (5KP No Roof Apex)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      runner_target:
        description: Runner target for this manual run
        required: true
        default: auto
        type: choice
        options:
          - auto
          - gcp-gpu
          - github-cpu

permissions:
  contents: read

concurrency:
  group: sdi-helper-pose-training
  cancel-in-progress: false

jobs:
  training-gcp-gpu:
    if: ${{ github.event_name == 'schedule' && vars.POSE_USE_GCP_GPU == '1' || github.event_name == 'workflow_dispatch' && inputs.runner_target == 'gcp-gpu' || github.event_name == 'workflow_dispatch' && inputs.runner_target == 'auto' && vars.POSE_USE_GCP_GPU == '1' }}
    runs-on: [self-hosted, linux, x64, gcp, gpu]
    timeout-minutes: 120

    env:
      POSE_KEYPOINTS: ground_ref,front_wheel_center,front_wheel_ground,rear_wheel_center,rear_wheel_ground
      POSE_LABEL_DIR: yolo_training/side_view_dataset/labels_pose_5kp_no_roof
      POSE_ALLOW_LEGACY_SOURCE: '1'
      POSE_REQUIRE_WHEEL_IMAGES: '0'
      POSE_RUN_NAME: side_view_pose_5kp_no_roof_${{ github.run_number }}
      POSE_EPOCHS: '10'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Select LabelMe JSON input directory
        id: pose_input
        shell: bash
        run: |
          set -euo pipefail
          primary="yolo_training/side_view_dataset/labelme_json_stanford_screening"

          primary_count=$(find "$primary" -maxdepth 1 -type f -name '*.json' 2>/dev/null | wc -l || true)

          if [ "${primary_count}" -gt 0 ]; then
            selected="$primary"
            selected_count="$primary_count"
          else
            selected=""
            selected_count="0"
          fi

          echo "selected_json_dir=$selected" >> "$GITHUB_OUTPUT"
          echo "json_count=$selected_count" >> "$GITHUB_OUTPUT"

          if [ "$selected_count" -gt 0 ]; then
            echo "should_train=true" >> "$GITHUB_OUTPUT"
            echo "Using LabelMe JSON source: $selected ($selected_count files)"
          else
            echo "should_train=false" >> "$GITHUB_OUTPUT"
            echo "No CLIP-gated Stanford screening JSON files found in $primary. Skipping pose training for this run."
          fi

      - name: Build 5KP YOLO pose labels from LabelMe JSON
        if: ${{ steps.pose_input.outputs.should_train == 'true' }}
        run: |
          python yolo_training/labelme_to_yolo_pose.py \
            --input "${{ steps.pose_input.outputs.selected_json_dir }}" \
            --output yolo_training/side_view_dataset/labels_pose_5kp_no_roof \
            --img-dir dataset_raw/images/train/side \
            --keypoints ground_ref,front_wheel_center,front_wheel_ground,rear_wheel_center,rear_wheel_ground

      - name: Check generated pose labels
        id: pose_labels
        if: ${{ steps.pose_input.outputs.should_train == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          labels_dir="yolo_training/side_view_dataset/labels_pose_5kp_no_roof"
          label_count=$(find "$labels_dir" -maxdepth 1 -type f -name '*.txt' 2>/dev/null | wc -l || true)
          echo "label_count=$label_count" >> "$GITHUB_OUTPUT"

          if [ "$label_count" -gt 0 ]; then
            echo "has_labels=true" >> "$GITHUB_OUTPUT"
            echo "Pose labels ready: $label_count files"
          else
            echo "has_labels=false" >> "$GITHUB_OUTPUT"
            echo "No pose label txt files generated in $labels_dir. Skipping training for this run."
          fi

      - name: Run pose training
        if: ${{ steps.pose_input.outputs.should_train == 'true' && steps.pose_labels.outputs.has_labels == 'true' }}
        run: |
          python yolo_training/train_pose.py

      - name: Skip note (no annotations)
        if: ${{ steps.pose_input.outputs.should_train != 'true' }}
        run: |
          echo "Pose training skipped due to empty annotation JSON sources."

      - name: Skip note (no converted pose labels)
        if: ${{ steps.pose_input.outputs.should_train == 'true' && steps.pose_labels.outputs.has_labels != 'true' }}
        run: |
          echo "Pose training skipped because conversion produced zero pose label txt files."

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pose-training-gcp-${{ github.run_number }}
          path: |
            yolo_training/runs/
            yolo_training/side_view_dataset/dataset_pose.yaml
          if-no-files-found: ignore

  training-github-cpu:
    if: ${{ github.event_name == 'schedule' && vars.POSE_USE_GCP_GPU != '1' || github.event_name == 'workflow_dispatch' && inputs.runner_target == 'github-cpu' || github.event_name == 'workflow_dispatch' && inputs.runner_target == 'auto' && vars.POSE_USE_GCP_GPU != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      POSE_KEYPOINTS: ground_ref,front_wheel_center,front_wheel_ground,rear_wheel_center,rear_wheel_ground
      POSE_LABEL_DIR: yolo_training/side_view_dataset/labels_pose_5kp_no_roof
      POSE_ALLOW_LEGACY_SOURCE: '1'
      POSE_REQUIRE_WHEEL_IMAGES: '0'
      POSE_RUN_NAME: side_view_pose_5kp_no_roof_${{ github.run_number }}
      POSE_EPOCHS: '10'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Select LabelMe JSON input directory
        id: pose_input
        shell: bash
        run: |
          set -euo pipefail
          primary="yolo_training/side_view_dataset/labelme_json_stanford_screening"

          primary_count=$(find "$primary" -maxdepth 1 -type f -name '*.json' 2>/dev/null | wc -l || true)

          if [ "${primary_count}" -gt 0 ]; then
            selected="$primary"
            selected_count="$primary_count"
          else
            selected=""
            selected_count="0"
          fi

          echo "selected_json_dir=$selected" >> "$GITHUB_OUTPUT"
          echo "json_count=$selected_count" >> "$GITHUB_OUTPUT"

          if [ "$selected_count" -gt 0 ]; then
            echo "should_train=true" >> "$GITHUB_OUTPUT"
            echo "Using LabelMe JSON source: $selected ($selected_count files)"
          else
            echo "should_train=false" >> "$GITHUB_OUTPUT"
            echo "No CLIP-gated Stanford screening JSON files found in $primary. Skipping pose training for this run."
          fi

      - name: Build 5KP YOLO pose labels from LabelMe JSON
        if: ${{ steps.pose_input.outputs.should_train == 'true' }}
        run: |
          python yolo_training/labelme_to_yolo_pose.py \
            --input "${{ steps.pose_input.outputs.selected_json_dir }}" \
            --output yolo_training/side_view_dataset/labels_pose_5kp_no_roof \
            --img-dir dataset_raw/images/train/side \
            --keypoints ground_ref,front_wheel_center,front_wheel_ground,rear_wheel_center,rear_wheel_ground

      - name: Check generated pose labels
        id: pose_labels
        if: ${{ steps.pose_input.outputs.should_train == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          labels_dir="yolo_training/side_view_dataset/labels_pose_5kp_no_roof"
          label_count=$(find "$labels_dir" -maxdepth 1 -type f -name '*.txt' 2>/dev/null | wc -l || true)
          echo "label_count=$label_count" >> "$GITHUB_OUTPUT"

          if [ "$label_count" -gt 0 ]; then
            echo "has_labels=true" >> "$GITHUB_OUTPUT"
            echo "Pose labels ready: $label_count files"
          else
            echo "has_labels=false" >> "$GITHUB_OUTPUT"
            echo "No pose label txt files generated in $labels_dir. Skipping training for this run."
          fi

      - name: Run pose training
        if: ${{ steps.pose_input.outputs.should_train == 'true' && steps.pose_labels.outputs.has_labels == 'true' }}
        run: |
          python yolo_training/train_pose.py

      - name: Skip note (no annotations)
        if: ${{ steps.pose_input.outputs.should_train != 'true' }}
        run: |
          echo "Pose training skipped due to empty annotation JSON sources."

      - name: Skip note (no converted pose labels)
        if: ${{ steps.pose_input.outputs.should_train == 'true' && steps.pose_labels.outputs.has_labels != 'true' }}
        run: |
          echo "Pose training skipped because conversion produced zero pose label txt files."

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pose-training-cpu-${{ github.run_number }}
          path: |
            yolo_training/runs/
            yolo_training/side_view_dataset/dataset_pose.yaml
          if-no-files-found: ignore
