name: Agent1 Labeling Every 10 Minutes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdi-helper-agent1-labeling
  cancel-in-progress: false

jobs:
  labeling:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-clip-vit-base-patch32-${{ runner.os }}
          restore-keys: |
            huggingface-clip-vit-base-patch32-

      - name: Detect wheel model path
        id: wheel_model
        shell: bash
        run: |
          set -euo pipefail
          primary="yolo_training/runs/roboflow_v3_local/weights/best.pt"

          if [ -f "$primary" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "model_path=$primary" >> "$GITHUB_OUTPUT"
            echo "Using wheel model: $primary"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "model_path=" >> "$GITHUB_OUTPUT"
            echo "No in-repo wheel model found at $primary. Skipping Agent1 labeling for this run."
          fi

      - name: Run Agent 1 labeling (5 keypoints, no roof_apex)
        if: ${{ steps.wheel_model.outputs.found == 'true' }}
        run: |
          python scripts/suggest_keypoints.py \
            --image-dir dataset_raw/images/train/side \
            --output yolo_training/side_view_dataset/labelme_json_stanford_screening \
            --model-path "${{ steps.wheel_model.outputs.model_path }}" \
            --priority-config config/agent1_keypoint_priority_5kp_no_roof_apex.json \
            --phase-only phase1 \
            --orientation-classifier clip \
            --reject-non-side \
            --quality-report logs/agent1_quality_report.csv \
            --overwrite

      - name: Skip note (no wheel model)
        if: ${{ steps.wheel_model.outputs.found != 'true' }}
        run: |
          echo "Agent1 labeling skipped because no accessible wheel model is available in this checkout."

      - name: Upload labeling logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: labeling-logs-${{ github.run_number }}
          path: |
            logs/
          if-no-files-found: ignore
